kind = "mobile"
previewPath = "/"
title = "Pharmacy Customer App"
version = "1.0.0"
id = "artifacts/customer-app"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 18249

[services.development]
run = "pnpm --filter @workspace/customer-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/customer-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/customer-app", "run", "serve" ]

[services.env]
PORT = "18249"
BASE_PATH = "/"
